<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" width="860" height="160" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="860" height="160" rx="12" fill="#0d1117"/>

  <!-- Card 1: Stability Score (purple) -->
  <rect x="10" y="10" width="195" height="140" rx="10" fill="#161b22" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="107" y="38" text-anchor="middle" font-size="11" fill="#8b949e" font-weight="600" letter-spacing="0.5">STABILITY SCORE</text>
  <text x="107" y="95" text-anchor="middle" font-size="42" fill="#a371f7" font-weight="700">79.6%</text>
  <text x="107" y="120" text-anchor="middle" font-size="11" fill="#8b949e">Overall loop stability</text>
  <rect x="30" y="133" width="154" height="5" rx="2.5" fill="#21262d"/>
  <rect x="30" y="133" width="123" height="5" rx="2.5" fill="#6f42c1"/>

  <!-- Card 2: Context Drift (amber) -->
  <rect x="220" y="10" width="195" height="140" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="317" y="38" text-anchor="middle" font-size="11" fill="#8b949e" font-weight="600" letter-spacing="0.5">CONTEXT DRIFT</text>
  <text x="317" y="95" text-anchor="middle" font-size="42" fill="#e3b341" font-weight="700">61.3%</text>
  <text x="317" y="120" text-anchor="middle" font-size="11" fill="#8b949e">Avg drift across tasks</text>
  <rect x="240" y="133" width="154" height="5" rx="2.5" fill="#21262d"/>
  <rect x="240" y="133" width="94" height="5" rx="2.5" fill="#d29922"/>

  <!-- Card 3: Error Propagation (green) -->
  <rect x="430" y="10" width="195" height="140" rx="10" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="527" y="38" text-anchor="middle" font-size="11" fill="#8b949e" font-weight="600" letter-spacing="0.5">ERROR PROPAGATION</text>
  <text x="527" y="95" text-anchor="middle" font-size="42" fill="#3fb950" font-weight="700">0%</text>
  <text x="527" y="120" text-anchor="middle" font-size="11" fill="#8b949e">Zero cascading errors</text>
  <rect x="450" y="133" width="154" height="5" rx="2.5" fill="#21262d"/>
  <rect x="450" y="133" width="5" height="5" rx="2.5" fill="#3fb950"/>

  <!-- Card 4: Tool Hallucination (green) -->
  <rect x="640" y="10" width="195" height="140" rx="10" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="737" y="38" text-anchor="middle" font-size="11" fill="#8b949e" font-weight="600" letter-spacing="0.5">TOOL HALLUCINATION</text>
  <text x="737" y="95" text-anchor="middle" font-size="42" fill="#3fb950" font-weight="700">0%</text>
  <text x="737" y="120" text-anchor="middle" font-size="11" fill="#8b949e">No hallucinated calls</text>
  <rect x="660" y="133" width="154" height="5" rx="2.5" fill="#21262d"/>
  <rect x="660" y="133" width="5" height="5" rx="2.5" fill="#3fb950"/>
</svg>